<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Devshare</title>
<style>
:root{color-scheme:dark;--bg:#2C1925;--panel:#35202e;--ink:#f7edf3;--muted:#bfaeb8;--line:#5a4050;--accent:#ffc6df;--danger:#ff9ba8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,sans-serif}main{width:min(1120px,calc(100% - 48px));margin:56px auto 80px}header{display:flex;align-items:center;justify-content:space-between;gap:32px;margin-bottom:36px}h1{margin:0;font-size:52px;line-height:1;letter-spacing:-.055em;font-weight:650}header p{margin:9px 0 0;color:var(--muted)}nav{display:flex;gap:6px;padding:5px;border:1px solid var(--line);border-radius:9px}button{font:inherit}nav button,.ghost{border:0;background:transparent;color:var(--muted);padding:8px 12px;border-radius:6px;cursor:pointer}nav button.active{background:var(--accent);color:var(--bg)}section{display:none;padding:28px 30px 30px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.018)}section.active{display:block}.bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}.bar h2{margin:0;font-size:18px}.count{color:var(--muted);font-size:13px}.list{border-top:1px solid var(--line)}.item{display:grid;grid-template-columns:minmax(240px,2fr) 110px minmax(220px,1.2fr) 72px;gap:24px;align-items:center;min-height:76px;padding:14px 4px;border-bottom:1px solid var(--line)}.item a{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}.item a:hover{text-decoration:underline;text-underline-offset:3px}.meta{color:var(--muted);font-size:13px}.pill{width:max-content;padding:3px 9px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}.pill.on{color:#bce9cb;border-color:#47705a}.danger{color:var(--danger)}.empty{color:var(--muted);padding:48px 4px}.new-key{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px 20px;align-items:center;margin:0 0 32px;padding:24px;border:1px solid var(--line);border-radius:10px;background:var(--panel)}.new-key>input{grid-column:1/-1;width:100%;height:46px;padding:0 14px;border:1px solid var(--line);border-radius:7px;background:var(--bg);color:var(--ink);font:inherit}.scopes{display:grid;grid-template-columns:repeat(6,max-content);gap:8px}.scopes label{display:flex;gap:7px;align-items:center;min-height:38px;padding:0 10px;border:1px solid var(--line);border-radius:6px;color:var(--muted);font-size:13px;white-space:nowrap}.primary{height:42px;border:1px solid var(--accent);border-radius:7px;background:var(--accent);color:var(--bg);padding:0 18px;font-weight:650;cursor:pointer;white-space:nowrap}.secret{margin:0 0 24px;padding:18px;border:1px solid var(--accent);border-radius:8px;background:var(--panel)}.secret code{display:block;margin:8px 0;overflow:auto;color:var(--accent)}@media(max-width:900px){.scopes{grid-template-columns:repeat(3,max-content)}.item{grid-template-columns:minmax(0,1fr) 100px auto}.item .secondary{display:none}}@media(max-width:650px){main{width:min(100% - 28px,1120px);margin:28px auto 50px}header{display:block}h1{font-size:44px}nav{width:max-content;margin-top:24px}section{padding:22px 18px}.new-key{display:block;padding:18px}.new-key>*{margin-bottom:12px}.scopes{display:grid;grid-template-columns:1fr 1fr}.item{grid-template-columns:minmax(0,1fr) auto;gap:12px}.item>.pill{display:none}}
</style></head><body><main>
<header><div><h1>devshare</h1><p>small infrastructure for unfinished things.</p></div><nav><button class="active" data-view="shares">shares</button><button data-view="keys">api keys</button></nav></header>
<section id="shares" class="active"><div class="bar"><h2>active shares</h2><span class="count" id="share-count"></span></div><div class="list" id="share-list"><div class="empty">loading…</div></div></section>
<section id="keys"><div class="bar"><h2>api keys</h2><span class="count" id="key-count"></span></div><form class="new-key" id="new-key"><input name="label" placeholder="key name, e.g. laptop or codex" required><div class="scopes"><label><input type="checkbox" name="scope" value="publish" checked>publish</label><label><input type="checkbox" name="scope" value="public">public</label><label><input type="checkbox" name="scope" value="keep">keep</label><label><input type="checkbox" name="scope" value="tunnel">live tunnels</label><label><input type="checkbox" name="scope" value="list" checked>list</label><label><input type="checkbox" name="scope" value="delete" checked>delete</label></div><button class="primary">create key</button></form><div id="secret"></div><div class="list" id="key-list"><div class="empty">loading…</div></div></section>
</main><script>
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const when=v=>v?new Date(v).toLocaleString():'never';
document.querySelector('nav').onclick=e=>{if(!e.target.dataset.view)return;document.querySelectorAll('nav button,section').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');document.querySelector('#'+e.target.dataset.view).classList.add('active')};
async function shares(){const r=await fetch('/v1/dashboard/shares');if(!r.ok)throw Error('could not load shares');const xs=await r.json();document.querySelector('#share-count').textContent=xs.length;document.querySelector('#share-list').innerHTML=xs.length?xs.map(x=>`<div class="item"><div><a href="${esc(x.url)}" target="_blank">${esc(x.url.replace('https://',''))}</a>${x.visibility==='private'?' <span title="private" aria-label="private">🔒</span>':''}<div class="meta">${esc(x.id)}</div></div><span class="pill ${x.online?'on':''}">${esc(x.type)}${x.type==='proxy'?' · '+(x.online?'live':'offline'):''}</span><span class="meta secondary">${x.expiresAt?'until '+when(x.expiresAt):'kept'}</span><button class="ghost danger" data-remove-share="${esc(x.id)}">remove</button></div>`).join(''):'<div class="empty">no active shares.</div>'}
async function keys(){const r=await fetch('/v1/dashboard/tokens');if(!r.ok)throw Error('could not load keys');const xs=await r.json();document.querySelector('#key-count').textContent=xs.filter(x=>!x.revoked).length+' active';document.querySelector('#key-list').innerHTML=xs.length?xs.map(x=>`<div class="item"><div><span>${esc(x.label)}</span><div class="meta">${esc(x.id)}</div></div><span class="pill ${x.revoked?'':'on'}">${x.revoked?'revoked':'active'}</span><span class="meta secondary">${esc(x.scopes.join(', '))}</span>${x.bootstrap||x.revoked?'':`<button class="ghost danger" data-revoke="${esc(x.id)}">revoke</button>`}</div>`).join(''):'<div class="empty">no api keys.</div>'}
document.querySelector('#new-key').onsubmit=async e=>{e.preventDefault();const f=new FormData(e.target),body={label:f.get('label'),scopes:f.getAll('scope')};const r=await fetch('/v1/dashboard/tokens',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});if(!r.ok){alert(await r.text());return}const x=await r.json();document.querySelector('#secret').innerHTML=`<div class="secret"><strong>copy this key now</strong><code>${esc(x.token)}</code><button class="ghost" id="copy">copy</button></div>`;document.querySelector('#copy').onclick=()=>navigator.clipboard.writeText(x.token);e.target.reset();keys()};
document.body.onclick=async e=>{if(e.target.dataset.removeShare&&confirm('remove this share?')){await fetch('/v1/dashboard/shares/'+e.target.dataset.removeShare,{method:'DELETE'});shares()}if(e.target.dataset.revoke&&confirm('revoke this api key?')){await fetch('/v1/dashboard/tokens/'+e.target.dataset.revoke,{method:'DELETE'});keys()}};
Promise.all([shares(),keys()]).catch(e=>document.querySelector('#share-list').innerHTML='<div class="empty">'+esc(e.message)+'</div>');
</script></body></html>
