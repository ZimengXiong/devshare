<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>devshare</title>
  <link rel="stylesheet" href="/style.css?v=0.3.10">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>devshare</h1>
      </div>
      <nav>
        <button class="selected" data-page="shares">shares</button>
        <button data-page="keys">api keys</button>
      </nav>
    </header>

    <section id="shares" class="selected">
      <div id="share-list">loading…</div>
    </section>

    <section id="keys">
      <form id="new-key">
        <input name="label" placeholder="key name" required>
        <fieldset>
          <label><input type="checkbox" name="scope" value="publish" checked> publish</label>
          <label><input type="checkbox" name="scope" value="public" checked> public</label>
          <label><input type="checkbox" name="scope" value="keep" checked> keep</label>
          <label><input type="checkbox" name="scope" value="tunnel" checked> tunnels</label>
          <label><input type="checkbox" name="scope" value="list" checked> list</label>
          <label><input type="checkbox" name="scope" value="delete" checked> delete</label>
        </fieldset>
        <button>create key</button>
      </form>
      <div id="secret"></div>
      <div id="key-list">loading…</div>
    </section>
  </main>
  <script src="/app.js?v=0.3.10"></script>
</body>
</html>
