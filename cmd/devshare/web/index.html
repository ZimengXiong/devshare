<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Devshare</title>
  <style>
    :root { color-scheme: dark; --bg:#2C1925; --ink:#f7edf3; --muted:#c9b7c2; --line:#5b4051; --accent:#ffc6df; }
    * { box-sizing:border-box }
    body { margin:0; background:var(--bg); color:var(--ink); font:16px/1.55 system-ui,-apple-system,sans-serif; }
    main { width:min(680px,calc(100% - 40px)); margin:14vh auto 8vh; }
    h1 { margin:0 0 .35rem; font-size:clamp(2.5rem,8vw,5.5rem); line-height:.95; letter-spacing:-.065em; font-weight:650; }
    .lead { color:var(--muted); max-width:510px; font-size:1.12rem; }
    pre { margin:3rem 0 1.2rem; padding:1rem 1.1rem; border:1px solid var(--line); border-radius:9px; overflow:auto; background:rgba(255,255,255,.025); color:var(--accent); }
    .row { display:flex; gap:1rem; flex-wrap:wrap; color:var(--muted); font-size:.9rem; }
    a { color:var(--ink); text-underline-offset:3px; }
    .console { margin-top:4rem; padding-top:2rem; border-top:1px solid var(--line); }
    .console h2 { margin:0 0 .35rem; font-size:1rem; font-weight:600; }
    .console p { margin:.2rem 0 1rem; color:var(--muted); font-size:.9rem; }
    button,.button { display:inline-flex;align-items:center;min-height:42px;padding:0 1rem;border:1px solid var(--line);border-radius:7px;font:inherit;color:var(--bg);background:var(--accent);cursor:pointer;font-weight:650;text-decoration:none }
    button.ghost { color:var(--muted); background:transparent; }
    #shares { margin-top:1.4rem; }
    .share { display:grid; grid-template-columns:1fr auto; gap:.2rem 1rem; padding:.85rem 0; border-top:1px solid var(--line); }
    .share a { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .meta { color:var(--muted); font-size:.78rem; }
    .share button { grid-row:1 / span 2; grid-column:2; min-height:32px; padding:0 .65rem; font-size:.78rem; }
    [hidden] { display:none !important; }
    footer { margin-top:5rem; padding-top:1rem; border-top:1px solid var(--line); color:var(--muted); font-size:.85rem; }
  </style>
</head>
<body><main>
  <h1>devshare</h1>
  <p class="lead">Put a webpage on the internet. Private by default, temporary by default, and one command from anywhere.</p>
  <pre><code>devshare publish ./dist</code></pre>
  <section class="console">
    <h2>Your shares</h2>
    <p id="hint">Sign in to see every active share.</p>
    <a class="button" id="login" href="#">Sign in</a>
    <div id="shares" hidden></div>
  </section>
  <footer>Small infrastructure for unfinished things.</footer>
</main>
<script>
  const login=document.querySelector('#login'), shares=document.querySelector('#shares'), hint=document.querySelector('#hint');
  login.href='/auth/login?return='+encodeURIComponent(location.origin+'/');
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  async function load(){
    const r=await fetch('/v1/dashboard/shares');
    if(r.status===401)return;
    if(!r.ok)throw new Error('Could not load shares.');
    const list=await r.json(); login.hidden=true; shares.hidden=false; hint.textContent=list.length?'Private by default. Temporary by default.':'No shares yet. Publish one from the CLI.';
    shares.innerHTML=list.map(x=>`<div class="share"><a href="${esc(x.url)}">${esc(x.url.replace('https://',''))}</a><span class="meta">${esc(x.kind)} · ${esc(x.visibility)} · ${x.expiresAt?'expires '+new Date(x.expiresAt).toLocaleString():'kept'}</span><button class="ghost" data-id="${esc(x.id)}">Remove</button></div>`).join('');
  }
  shares.addEventListener('click',async e=>{const id=e.target.dataset.id;if(!id)return;if(!confirm('Remove this share?'))return;await fetch('/v1/dashboard/shares/'+id,{method:'DELETE'});load()});
  load().catch(err=>hint.textContent=err.message);
</script>
</body>
</html>
