<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Devshare</title>
<style>
:root{color-scheme:dark;--bg:#2C1925;--panel:#35202e;--ink:#f7edf3;--muted:#bfaeb8;--line:#5a4050;--accent:#ffc6df;--danger:#ff9ba8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,sans-serif}main{width:min(1080px,calc(100% - 36px));margin:8vh auto}header{display:flex;align-items:end;justify-content:space-between;gap:2rem;margin-bottom:3.5rem}h1{margin:0;font-size:clamp(2.7rem,7vw,5.4rem);line-height:.85;letter-spacing:-.065em;font-weight:650}header p{margin:.6rem 0 0;color:var(--muted)}nav{display:flex;gap:.3rem}button{font:inherit}nav button,.ghost{border:0;background:transparent;color:var(--muted);padding:.55rem .75rem;border-radius:6px;cursor:pointer}nav button.active{background:var(--accent);color:var(--bg)}section{display:none}section.active{display:block}.bar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem}.bar h2{margin:0;font-size:1rem}.count{color:var(--muted);font-size:.85rem}.list{border-top:1px solid var(--line)}.item{display:grid;grid-template-columns:minmax(0,1.7fr) .65fr .65fr auto;gap:1rem;align-items:center;padding:1rem .15rem;border-bottom:1px solid var(--line)}.item a{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}.item a:hover{text-decoration:underline;text-underline-offset:3px}.meta{color:var(--muted);font-size:.82rem}.pill{width:max-content;padding:.18rem .5rem;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:.76rem}.pill.on{color:#bce9cb;border-color:#47705a}.danger{color:var(--danger)}.empty{color:var(--muted);padding:3rem 0}.new-key{display:grid;grid-template-columns:1fr auto;gap:.7rem;margin:1.4rem 0 2.4rem;max-width:650px}.new-key input{grid-column:1/-1;width:100%;padding:.7rem .8rem;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);font:inherit}.scopes{display:flex;gap:.4rem;flex-wrap:wrap}.scopes label{display:flex;gap:.35rem;align-items:center;padding:.45rem .6rem;border:1px solid var(--line);border-radius:6px;color:var(--muted);font-size:.8rem}.primary{border:1px solid var(--accent);border-radius:7px;background:var(--accent);color:var(--bg);padding:.6rem .9rem;font-weight:650;cursor:pointer}.secret{margin:0 0 2rem;padding:1rem;border:1px solid var(--accent);border-radius:8px;background:var(--panel)}.secret code{display:block;margin:.6rem 0;overflow:auto;color:var(--accent)}footer{margin-top:5rem;padding-top:1rem;border-top:1px solid var(--line);color:var(--muted);font-size:.8rem}@media(max-width:700px){main{margin:5vh auto}header{display:block;margin-bottom:2rem}nav{margin-top:1.5rem}.item{grid-template-columns:minmax(0,1fr) auto}.item .secondary{display:none}.new-key{display:block}.new-key>*{margin-bottom:.7rem}}
</style></head><body><main>
<header><div><h1>devshare</h1><p>small infrastructure for unfinished things.</p></div><nav><button class="active" data-view="shares">shares</button><button data-view="keys">api keys</button></nav></header>
<section id="shares" class="active"><div class="bar"><h2>active shares</h2><span class="count" id="share-count"></span></div><div class="list" id="share-list"><div class="empty">loading…</div></div></section>
<section id="keys"><div class="bar"><h2>api keys</h2><span class="count" id="key-count"></span></div><form class="new-key" id="new-key"><input name="label" placeholder="key name, e.g. laptop or codex" required><div class="scopes"><label><input type="checkbox" name="scope" value="publish" checked>publish</label><label><input type="checkbox" name="scope" value="public">public</label><label><input type="checkbox" name="scope" value="keep">keep</label><label><input type="checkbox" name="scope" value="tunnel">live tunnels</label><label><input type="checkbox" name="scope" value="list" checked>list</label><label><input type="checkbox" name="scope" value="delete" checked>delete</label></div><button class="primary">create key</button></form><div id="secret"></div><div class="list" id="key-list"><div class="empty">loading…</div></div></section>
<footer>private and ephemeral by default.</footer>
</main><script>
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const when=v=>v?new Date(v).toLocaleString():'never';
document.querySelector('nav').onclick=e=>{if(!e.target.dataset.view)return;document.querySelectorAll('nav button,section').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');document.querySelector('#'+e.target.dataset.view).classList.add('active')};
async function shares(){const r=await fetch('/v1/dashboard/shares');if(!r.ok)throw Error('could not load shares');const xs=await r.json();document.querySelector('#share-count').textContent=xs.length;document.querySelector('#share-list').innerHTML=xs.length?xs.map(x=>`<div class="item"><div><a href="${esc(x.url)}" target="_blank">${esc(x.url.replace('https://',''))}</a><div class="meta">${esc(x.id)}</div></div><span class="pill ${x.online?'on':''}">${x.kind==='tunnel'?(x.online?'live':'offline'):'static'}</span><span class="meta secondary">${esc(x.visibility)} · ${x.expiresAt?'until '+when(x.expiresAt):'kept'}</span><button class="ghost danger" data-remove-share="${esc(x.id)}">remove</button></div>`).join(''):'<div class="empty">no active shares.</div>'}
async function keys(){const r=await fetch('/v1/dashboard/tokens');if(!r.ok)throw Error('could not load keys');const xs=await r.json();document.querySelector('#key-count').textContent=xs.filter(x=>!x.revoked).length+' active';document.querySelector('#key-list').innerHTML=xs.length?xs.map(x=>`<div class="item"><div><span>${esc(x.label)}</span><div class="meta">${esc(x.id)}</div></div><span class="pill ${x.revoked?'':'on'}">${x.revoked?'revoked':'active'}</span><span class="meta secondary">${esc(x.scopes.join(', '))}</span>${x.bootstrap||x.revoked?'':`<button class="ghost danger" data-revoke="${esc(x.id)}">revoke</button>`}</div>`).join(''):'<div class="empty">no api keys.</div>'}
document.querySelector('#new-key').onsubmit=async e=>{e.preventDefault();const f=new FormData(e.target),body={label:f.get('label'),scopes:f.getAll('scope')};const r=await fetch('/v1/dashboard/tokens',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});if(!r.ok){alert(await r.text());return}const x=await r.json();document.querySelector('#secret').innerHTML=`<div class="secret"><strong>copy this key now</strong><code>${esc(x.token)}</code><button class="ghost" id="copy">copy</button></div>`;document.querySelector('#copy').onclick=()=>navigator.clipboard.writeText(x.token);e.target.reset();keys()};
document.body.onclick=async e=>{if(e.target.dataset.removeShare&&confirm('remove this share?')){await fetch('/v1/dashboard/shares/'+e.target.dataset.removeShare,{method:'DELETE'});shares()}if(e.target.dataset.revoke&&confirm('revoke this api key?')){await fetch('/v1/dashboard/tokens/'+e.target.dataset.revoke,{method:'DELETE'});keys()}};
Promise.all([shares(),keys()]).catch(e=>document.querySelector('#share-list').innerHTML='<div class="empty">'+esc(e.message)+'</div>');
</script></body></html>
